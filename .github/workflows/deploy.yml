name: Deploy Node App to Local VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Stop existing app
        run: |
          pkill node || true

      - name: Start Node app
        run: |
          nohup node server.js > app.log 2>&1 &
